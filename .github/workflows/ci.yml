name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: bevan_user
          POSTGRES_PASSWORD: ci_test_password_only
          POSTGRES_DB: bevan_portfolio
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://bevan_user:ci_test_password_only@localhost:5432/bevan_portfolio"
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_URL: "http://localhost:3000"
      AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
      AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD_HASH_B64: ${{ secrets.ADMIN_PASSWORD_HASH_B64 }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Push Prisma Schema
        run: bun x prisma db push

      - name: Seed Database
        run: bun x prisma db seed

      - name: Build Next.js Application
        run: bun run build

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Start Production Server
        run: bun run start &
        env:
          NODE_ENV: production

      - name: Wait for Server to be Ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Server is ready!"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Server failed to start"
          exit 1

      - name: Run E2E Admin Tests (Playwright)
        run: node test-logout-pw.cjs
